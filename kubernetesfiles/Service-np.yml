apiVersion: v1
kind: Service
metadata:
  name: mysvc-Nodeport
spec:
  type: NodePort
  selector: 
    app: kubeserve
  ports:
    - targetPort: 80  # container port
      port: 80   # service port
      nodePort: 30009  # port on the VM/node where the service is exposed
       # NP range is 30000-32767
